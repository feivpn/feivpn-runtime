# GoReleaser config for feivpnctl + bundled bin/ + templates/.
# Triggered by tags matching v* via .github/workflows/release.yml.
#
# Each archive is a self-contained tarball containing:
#   pkg/feivpnctl
#   pkg/bin/feivpn-<plat>            (pinned upstream daemon)
#   pkg/bin/feiapi-<plat>            (pinned upstream API client)
#   pkg/bin/feivpn-router-<plat>     (root proxy controller, C++)
#                                    macOS uses the universal binary
#                                    (lipo arm64+x86_64), Linux is per-arch.
#   pkg/templates/...
#   pkg/manifest.json
#   LICENSE README.md SKILL.md
#
# scripts/install.sh consumes the resulting feivpn-runtime-<os>-<arch>.tar.gz
# plus its .sha256 sidecar and symlinks bin/{feivpn,feiapi,feivpn-router}
# to the per-platform file.

version: 2
project_name: feivpn-runtime

before:
  hooks:
    - go mod tidy
    - ./scripts/verify-bins.sh

# GoReleaser v2 removed the per-OS `goos:` filter on archives. To still get
# one archive-recipe per OS (so the `files:` templates can reference per-OS
# helper binaries cleanly), we split the feivpnctl build into a linux-only
# and a darwin-only build and bind each archive to its matching build.
builds:
  - id: feivpnctl-linux
    main: ./cmd/feivpnctl
    binary: feivpnctl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:    [linux]
    goarch:  [amd64, arm64]
  - id: feivpnctl-darwin
    main: ./cmd/feivpnctl
    binary: feivpnctl
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:    [darwin]
    goarch:  [amd64, arm64]

archives:
  # Linux: feivpn-router ships per-arch (linux-amd64 / linux-arm64).
  - id: tarball-linux
    ids: [feivpnctl-linux]
    name_template: "feivpn-runtime-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    wrap_in_directory: pkg
    # NOTE: in GoReleaser v2 `src:` is templated but `dst:` is taken
    # literally (this changed from v1). When `dst:` is omitted the file
    # is placed at its `src` path inside the archive, which is exactly
    # what we want — so we simply drop `dst:`.
    files:
      - src: bin/feivpn-{{ .Os }}-{{ .Arch }}
      - src: bin/feiapi-{{ .Os }}-{{ .Arch }}
      - src: bin/feivpn-router-{{ .Os }}-{{ .Arch }}
      - src: templates/**/*
      # Rename binaries.manifest.json → manifest.json at the archive root.
      # `dst:` is taken literally (NOT templated) in v2, but a static path
      # is fine here.
      - src: manifest/binaries.manifest.json
        dst: manifest.json
      - LICENSE
      - README.md
      - SKILL.md

  # macOS: feivpn / feiapi are per-arch but feivpn-router is a single
  # Universal Binary (mirrors the upstream Electron client). Both
  # darwin-arm64 and darwin-amd64 tarballs include the same router file;
  # install.sh symlinks it to the stable name.
  - id: tarball-darwin
    ids: [feivpnctl-darwin]
    name_template: "feivpn-runtime-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    wrap_in_directory: pkg
    files:
      - src: bin/feivpn-{{ .Os }}-{{ .Arch }}
      - src: bin/feiapi-{{ .Os }}-{{ .Arch }}
      - src: bin/feivpn-router-darwin-universal
      - src: templates/**/*
      - src: manifest/binaries.manifest.json
        dst: manifest.json
      - LICENSE
      - README.md
      - SKILL.md

checksum:
  # split: true emits one file per archive named "<archive>.sha256",
  # which is exactly what scripts/install.sh expects (it downloads
  # "<tarball>.sha256" alongside the tarball). The name_template here
  # only affects the legacy aggregated checksums file (which we don't
  # ship), but we still keep it unique-per-artifact so GoReleaser
  # doesn't warn about duplicate artifact names.
  name_template: "{{ .ArtifactName }}.sha256"
  algorithm: sha256
  split: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: feivpn
    name: feivpn-runtime
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
